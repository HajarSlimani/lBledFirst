version: "3.8"

services:

  mysql:
    image: mysql:8.0
    container_name: lbledfirst-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lbled_first
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: lbledfirst-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:

      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/lbled_first?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"


  adminer:
    image: adminer
    container_name: lbledfirst-adminer
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - "8081:8080"

volumes:
  mysql_data: